{% extends 'base.html' %} 
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="mb-4">
      <a href="{% url 'dashboard_etudiant' %}" class="text-decoration-none text-muted">
        <i class="bi bi-arrow-left me-1"></i> Retour au tableau de bord
      </a>
    </div>

    <div class="card shadow-sm border-0 mb-4">
      <div class="card-header bg-white border-bottom-0 pt-4 pb-0 px-4 d-flex justify-content-between align-items-center">
        <h3 class="text-dark fw-bold mb-0">{{ quiz.titre }}</h3>
        <div class="bg-light px-3 py-2 rounded-pill text-accent fw-bold fs-5 shadow-sm">
          <i class="bi bi-stopwatch me-1"></i>
          <span id="timer">--:--</span>
        </div>
      </div>

      <div class="card-body p-4">
        <div class="progress mb-5" style="height: 8px">
          <div class="progress-bar bg-success rounded-pill" role="progressbar" style="width: 10%"></div>
        </div>

        <form method="POST" action="{% url 'soumettre_quiz' quiz.id %}">
          {% csrf_token %}
          <input type="hidden" name="question_id" value="{{ question.id }}" />

          <div class="mb-4 p-4 border rounded-3 bg-light">
            <div class="d-flex justify-content-between mb-2">
              <span class="badge bg-info text-dark">Niveau : {{ difficulte|title }}</span>
              <span class="text-muted small">Algorithme adaptatif actif <i class="bi bi-robot"></i></span>
            </div>

            <h4 class="fw-bold text-dark mb-4">{{ question.texte }}</h4>
            <div class="d-flex flex-column gap-3">
              <input type="radio" class="btn-check" name="question_{{ question.id }}" id="option_a" value="Option A" required />
              <label class="btn btn-outline-primary text-start p-3 fs-5 rounded-3 w-100" for="option_a">
                {{ question.option_a }}
              </label>

              <input type="radio" class="btn-check" name="question_{{ question.id }}" id="option_b" value="Option B" />
              <label class="btn btn-outline-primary text-start p-3 fs-5 rounded-3 w-100" for="option_b">
                {{ question.option_b }}
              </label>

              <input type="radio" class="btn-check" name="question_{{ question.id }}" id="option_c" value="Option C" />
              <label class="btn btn-outline-primary text-start p-3 fs-5 rounded-3 w-100" for="option_c">
                {{ question.option_c }}
              </label>
            </div>
          </div>

          <div class="text-end mt-4">
            <button type="submit" class="btn btn-primary px-5 py-2 fs-5">
              Valider et continuer <i class="bi bi-arrow-right-circle ms-2"></i>
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  const finQuizTime = parseFloat("{{ fin_quiz_timestamp }}") * 1000;
  const timerElement = document.getElementById('timer');

  const compteARebours = setInterval(() => {
      const maintenant = new Date().getTime();
      const distance = finQuizTime - maintenant;

      if (distance <= 0) {
          clearInterval(compteARebours);
          timerElement.textContent = "00:00";
          timerElement.classList.replace('text-accent', 'text-danger');
          const form = document.querySelector('form');
          if (form) {
              form.submit();
          }
      } else {
          let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
          let secondes = Math.floor((distance % (1000 * 60)) / 1000);

          minutes = minutes < 10 ? "0" + minutes : minutes;
          secondes = secondes < 10 ? "0" + secondes : secondes;

          timerElement.textContent = minutes + ":" + secondes;

          if (distance < 30000) {
              timerElement.classList.replace('text-accent', 'text-danger');
          }
      }
  }, 1000);
</script>
{% endblock %}
