{% extends 'base.html' %} {% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6">
    <div class="card shadow-sm border-0 rounded-4 p-5">
      <div class="text-center mb-4">
        <i
          class="bi bi-shield-lock-fill text-primary"
          style="font-size: 3rem"
        ></i>
        <h3 class="text-primary fw-bold mt-2">Nouveau mot de passe</h3>
        <p class="text-muted">
          Définissez un nouveau mot de passe pour votre compte.
        </p>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="bg-light p-3 rounded-3 mb-4">{{ form.as_p }}</div>

        <button
          type="submit"
          class="btn btn-primary w-100 btn-lg rounded-pill mt-2"
        >
          <i class="bi bi-check2-circle me-1"></i> Sauvegarder
        </button>
        <a
          href="{% url 'profil' %}"
          class="btn btn-outline-secondary w-100 rounded-pill mt-3"
        >
          Annuler
        </a>
      </form>
    </div>
  </div>
</div>

<style>
  form p {
    margin-bottom: 15px;
    color: #4a4a4a;
    font-weight: 500;
  }
  form input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #dee2e6;
    margin-top: 5px;
  }
  form ul.errorlist {
    color: #d83b26;
    list-style-type: none;
    padding-left: 0;
    font-size: 0.9em;
    margin-top: 5px;
  }
</style>
{% endblock %}
