{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center text-center mt-5">
    <div class="col-md-6">
        <div class="card shadow p-5 border-0 rounded-4">
            <h2 class="text-dark fw-bold mb-4">Résultat : {{ quiz.titre }}</h2>
            <div class="mb-4">
                <i class="bi bi-trophy-fill text-warning" style="font-size: 4rem;"></i>
            </div>
            <h1 class="display-2 text-success fw-bold mb-4">{{ score }} / {{ total }}</h1>
            <p class="fs-5 text-muted mb-5">Vos réponses ont bien été corrigées et enregistrées de manière sécurisée.</p>
            <a href="{% url 'dashboard_etudiant' %}" class="btn btn-primary btn-lg px-5">Retour au tableau de bord</a>
        </div>
    </div>
</div>
{% endblock %}
