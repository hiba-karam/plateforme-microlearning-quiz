{% extends 'base.html' %} {% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow-sm border-0 rounded-4 p-5">
      <div class="text-center mb-4">
        <i
          class="bi bi-mortarboard-fill text-primary"
          style="font-size: 3rem"
        ></i>
        <h3 class="text-primary fw-bold mt-2">Connexion</h3>
        <p class="text-muted">Accédez à votre espace EMSI MicroLearn</p>
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label text-secondary fw-medium"
            >Nom d'utilisateur</label
          >
          <input
            type="text"
            name="username"
            class="form-control form-control-lg rounded-3"
            placeholder="Votre identifiant"
            required
          />
        </div>
        <div class="mb-4">
          <label class="form-label text-secondary fw-medium"
            >Mot de passe</label
          >
          <input
            type="password"
            name="password"
            class="form-control form-control-lg rounded-3"
            placeholder="••••••••"
            required
          />
        </div>
        <button
          type="submit"
          class="btn btn-primary w-100 btn-lg rounded-pill mt-2"
        >
          Se connecter
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
